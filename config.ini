# Kindle Button Mapper Configuration
#
# This file maps input device keys to scripts/commands.
# Use `just list-devices` to find the device name.
#
# Uses KOReader HTTP Inspector API for reader control.
# Ensure HTTP Inspector is enabled in KOReader:
#   Menu -> More tools -> KOReader HTTP inspector -> Start HTTP server

[device]
# Name of the input device to monitor (from /sys/class/input/eventX/device/name)
# Leave empty to use the device path directly
name =

# Direct path to input device (optional, overrides name lookup)
path = /dev/input/event2

# Grab device for exclusive access (prevents other apps from receiving events)
grab = false

[settings]
# Debounce time in milliseconds (prevents double-triggers, 0 to disable)
debounce_ms = 0

# Log button presses to the log file
log_buttons = true

# Time in milliseconds to trigger long press action (hold threshold)
long_press_ms = 500

# Repeat interval in milliseconds when holding a button (0 to disable repeat)
repeat_ms = 100

# Script to run when device connects (e.g., inhibit screen saver)
on_connect = /mnt/us/kindle-button-mapper/scripts/start-inhib.sh

# Script to run when device disconnects (e.g., allow screen saver)
on_disconnect = /mnt/us/kindle-button-mapper/scripts/stop-inhib.sh

[buttons]
# Controller button mappings
# | Controller | HID Button | Linux Code | Name      |
# |------------|------------|------------|-----------|
# | A          | 1          | 304        | BTN_SOUTH |
# | B          | 2          | 305        | BTN_EAST  |
# | X          | 3          | 306        | BTN_C     |
# | Y          | 4          | 307        | BTN_NORTH |
# | LB         | 5          | 308        | BTN_WEST  |
# | RB         | 6          | 309        | BTN_Z     |
# | Select     | 7          | 310        | BTN_TL    |
# | Start      | 8          | 311        | BTN_TR    |

# BTN_SOUTH (304) = Next page
304 = /mnt/us/kindle-button-mapper/scripts/koreader.sh next_page

# BTN_NORTH (307) = Previous page
307 = /mnt/us/kindle-button-mapper/scripts/koreader.sh prev_page

# BTN_EAST (305) = Brightness up
305 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness 1

# BTN_C (306) = Brightness down
306 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness -1

# BTN_WEST (308) = Brightness down
308 = /mnt/us/kindle-button-mapper/scripts/koreader.sh font_down 1

# BTN_Z (309) = Brightness up
309 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness 10

# BTN_TL (310) = Toggle night mode
310 = /mnt/us/kindle-button-mapper/scripts/koreader.sh night_mode

# BTN_TR (311) = Toggle frontlight
311 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness_toggle

[dpad]
# D-pad mappings (Hat0X/Hat0Y axis events)
up = /mnt/us/kindle-button-mapper/scripts/koreader.sh prev_page
down = /mnt/us/kindle-button-mapper/scripts/koreader.sh next_page
left = /mnt/us/kindle-button-mapper/scripts/koreader.sh rotate
right = /mnt/us/kindle-button-mapper/scripts/koreader.sh toggle_status_bar

[triggers]
# Analog trigger mappings (Gas/Brake axis events)
lt = /mnt/us/kindle-button-mapper/scripts/koreader.sh font_up 1
rt = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness -10
