# Kindle Button Mapper - multi-device config
# Each device has its own [device.NAME] block plus [device.NAME.{kind}]
# subsections for buttons, longpress, dpad, dpad_longpress, triggers,
# triggers_longpress. Edit via the WAF or by hand.

[settings]
debounce_ms = 0
log_buttons = true
long_press_ms = 500
repeat_ms = 100
on_connect = /mnt/us/kindle-button-mapper/scripts/start-inhib.sh
on_disconnect = /mnt/us/kindle-button-mapper/scripts/stop-inhib.sh

[device.gamepad]
name = HID Device
path = /dev/input/event2
grab = true

[device.gamepad.buttons]
304 = /mnt/us/kindle-button-mapper/scripts/koreader.sh next_page
307 = /mnt/us/kindle-button-mapper/scripts/koreader.sh prev_page
305 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness 1
306 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness -1
308 = /mnt/us/kindle-button-mapper/scripts/koreader.sh font_down 1
309 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness 10
310 = /mnt/us/kindle-button-mapper/scripts/koreader.sh night_mode
311 = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness_toggle

[device.gamepad.dpad]
up = /mnt/us/kindle-button-mapper/scripts/koreader.sh prev_page
down = /mnt/us/kindle-button-mapper/scripts/koreader.sh next_page
left = /mnt/us/kindle-button-mapper/scripts/koreader.sh rotate
right = /mnt/us/kindle-button-mapper/scripts/koreader.sh toggle_status_bar

[device.gamepad.triggers]
lt = /mnt/us/kindle-button-mapper/scripts/koreader.sh font_up 1
rt = /mnt/us/kindle-button-mapper/scripts/koreader.sh brightness -10
